<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FINA HELPER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #f4f7f6; /* Warna background abu-abu terang */
            margin: 0;
        }
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
        }
        .btn-login {
            background-color: #0d6efd;
            border: none;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="text-center mb-4">
        <i class="bi bi-shield-lock text-primary" style="font-size: 3rem;"></i>
        <h3 class="fw-bold mt-2">FINA HELPER</h3>
        <p class="text-muted small text-uppercase" style="letter-spacing: 1px;">Sign in to start your session</p>
    </div>

    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold small">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control form-control-lg border-start-0" style="font-size: 1rem;" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold small">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
                <input type="password" name="password" class="form-control form-control-lg border-start-0" style="font-size: 1rem;" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold btn-login shadow-sm">Login</button>
    </form>
    
    <div class="text-center mt-5">
        <small class="text-muted">&copy; 2026 IT Administrator - PT. Agson International</small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
