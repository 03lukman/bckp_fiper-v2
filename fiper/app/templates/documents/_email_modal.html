<div class="modal fade" id="emailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Kirim Laporan via Email</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Email Penerima:</label>
                    <input type="email" id="modalEmail" class="form-control" placeholder="nama@perusahaan.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Catatan Tambahan:</label>
                    <textarea id="modalNote" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="button" id="btnSendEmail" onclick="processSendEmail()" class="btn btn-primary">Kirim Sekarang</button>
            </div>
        </div>
    </div>
</div>
