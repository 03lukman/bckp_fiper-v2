<div class="col-md-3">
    <label class="form-label fw-bold small">Dari Tanggal:</label>
    <input type="date" id="dateStart" class="form-control form-control-sm" onchange="filterData()">
</div>
<div class="col-md-3">
    <label class="form-label fw-bold small">Sampai Tanggal:</label>
    <input type="date" id="dateEnd" class="form-control form-control-sm" onchange="filterData()">
</div>
<div class="col-md-6">
    <label class="form-label fw-bold small">Cari Data:</label>
    <div class="input-group input-group-sm">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" id="searchGeneral" class="form-control" placeholder="Ketik apa saja untuk memfilter..." onkeyup="filterData()">
    </div>
</div>
